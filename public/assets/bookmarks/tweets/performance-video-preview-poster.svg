<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Tweet video preview poster</title>
  <desc id="desc">Poster image used for a cached local tweet video preview slot.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" />
  <rect x="72" y="72" width="1136" height="576" fill="none" stroke="#f5f5f5" stroke-opacity="0.22" />
  <circle cx="180" cy="180" r="46" fill="#f5f5f5" fill-opacity="0.08" stroke="#f5f5f5" stroke-opacity="0.2" />
  <text x="180" y="188" fill="#f5f5f5" fill-opacity="0.8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="28" text-anchor="middle">SB</text>
  <text x="250" y="164" fill="#fafafa" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Soren Blank</text>
  <text x="250" y="206" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">@sorenblank / local cache</text>
  <text x="120" y="322" fill="#fafafa" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="600">
    How I optimized video assets on my site
  </text>
  <text x="120" y="378" fill="#fafafa" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="600">
    and improved perceived performance.
  </text>
  <rect x="120" y="480" width="180" height="54" fill="#fafafa" fill-opacity="0.08" stroke="#fafafa" stroke-opacity="0.25" />
  <polygon points="190,495 190,519 214,507" fill="#fafafa" />
  <text x="232" y="514" fill="#fafafa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">VIDEO SLOT</text>
  <text x="120" y="596" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">
    Drop a local MP4 at /assets/bookmarks/tweets/performance-video-preview.mp4
  </text>
</svg>
